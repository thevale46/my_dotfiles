# ============================================================
# tmux config — WSL2 (win32yank clipboard)
# ============================================================

# === Plugins =================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'omerxx/tmux-floax'

# === Core settings ===========================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on

# === Key bindings ============================================
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Copy mode ===============================================
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# === Clipboard (WSL2 — win32yank) ============================
set -g set-clipboard off
set -g @yank_selection_mouse 'clipboard'
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i --crlf"
bind -n MouseDown3Pane run "win32yank.exe -o --lf | tmux load-buffer - && tmux paste-buffer"
bind p run "win32yank.exe -o --lf | tmux load-buffer - && tmux paste-buffer"

# === Plugin config ===========================================
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @floax-bind 'p'
set -g @thumbs-key 'f'

# === Catppuccin theme ========================================
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g status-position top
set -g @catppuccin_status_modules_right 'directory session date_time'

# === TPM init (always last) ==================================
run '~/.config/tmux/plugins/tpm/tpm'
